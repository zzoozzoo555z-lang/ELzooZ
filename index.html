<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صدقة جارية على روح زياد خالد</title>
    <style>
        :root {
            --primary-blue: #0a192f;
            --light-blue: #172a45;
            --gold: #d4af37;
            --gold-glow: #f3e5ab;
            --gold-dim: rgba(212,175,55,0.15);
            --text: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, var(--light-blue) 0%, var(--primary-blue) 100%);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .stars { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
        .star { position:absolute; background:white; border-radius:50%; animation:fall linear infinite; }
        @keyframes fall {
            0%   { transform:translateY(-20px); opacity:0; }
            10%  { opacity:1; }
            90%  { opacity:1; }
            100% { transform:translateY(100vh) translateX(30px); opacity:0; }
        }

        .container { max-width:1100px; margin:0 auto; padding:25px 20px; position:relative; z-index:1; text-align:center; }

        .main-header { margin-bottom:40px; animation:fadeIn 1.5s ease; }
        .profile-img {
            width:180px; height:180px; border-radius:50%;
            border:4px solid var(--gold); box-shadow:0 0 30px var(--gold);
            object-fit:cover; margin-bottom:18px; transition:transform .3s;
        }
        .profile-img:hover { transform:scale(1.05); }
        .basmala { font-size:1.4rem; color:var(--gold-glow); margin-bottom:8px; }
        .site-title { font-size:2rem; color:var(--gold); text-shadow:0 2px 12px rgba(212,175,55,.5); }

        .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:20px; margin-top:30px; }
        .card {
            background:rgba(23,42,69,.85); border:2px solid var(--gold);
            border-radius:15px; padding:22px 12px; cursor:pointer;
            transition:all .3s; box-shadow:0 4px 14px rgba(0,0,0,.3);
        }
        .card:hover { transform:translateY(-8px); background:var(--gold); box-shadow:0 10px 25px var(--gold); }
        .card:hover h3 { color:var(--primary-blue); }
        .card .ico { font-size:2.8rem; display:block; margin-bottom:12px; }
        .card h3 { font-size:1.05rem; color:var(--gold); transition:color .3s; }

        .dev-wrap { margin-top:30px; display:flex; justify-content:center; }
        .dev-btn {
            background:rgba(23,42,69,.6); border:1px solid rgba(212,175,55,.4);
            border-radius:12px; padding:11px 24px; cursor:pointer;
            display:inline-flex; align-items:center; gap:10px;
            color:rgba(212,175,55,.7); font-size:.9rem; text-decoration:none;
            transition:all .3s;
        }
        .dev-btn:hover { background:rgba(37,211,102,.15); border-color:#25D366; color:#25D366; transform:translateY(-3px); }

        /* المودال */
        .modal {
            display:none; position:fixed; inset:0;
            background:rgba(10,25,47,.97); z-index:100;
            justify-content:center; align-items:flex-start;
            padding:20px; overflow-y:auto;
            animation:fadeIn .3s ease;
        }
        .modal.active { display:flex; }
        .modal-box {
            background:var(--light-blue); border:3px solid var(--gold);
            border-radius:20px; width:100%; max-width:900px;
            padding:30px 25px; position:relative;
            box-shadow:0 0 40px rgba(212,175,55,.25);
            margin:auto;
        }

        /* مودال المصحف - أكبر وأوضح */
        .modal-box.mushaf-modal {
            max-width:1100px;
            padding:20px 15px;
        }

        .close-btn {
            position:absolute; top:14px; right:18px; font-size:2rem;
            color:var(--gold); background:none; border:none; cursor:pointer; line-height:1;
        }
        .close-btn:hover { color:#fff; }
        .modal-title {
            color:var(--gold); font-size:1.7rem; margin-bottom:22px;
            border-bottom:2px solid var(--gold); padding-bottom:10px;
        }

        .dcard {
            background:rgba(255,255,255,.05); padding:15px;
            margin-bottom:14px; border-radius:10px; border-left:3px solid var(--gold);
            text-align:right; line-height:1.9;
        }
        .dcard h3 { color:var(--gold); margin-bottom:8px; }

        /* مشغل القرآن */
        #quran-player { display:flex; flex-direction:column; gap:18px; }
        .reciter-select-wrap { display:flex; flex-direction:column; gap:8px; text-align:right; }
        .reciter-select-wrap label { color:var(--gold-glow); font-size:.95rem; }
        select.q-select {
            background:rgba(10,25,47,.8); border:2px solid var(--gold);
            color:var(--text); padding:10px 14px; border-radius:10px;
            font-size:1rem; width:100%; cursor:pointer; direction:rtl;
        }
        select.q-select:focus { outline:none; box-shadow:0 0 0 2px rgba(212,175,55,.4); }
        select.q-select option { background:#172a45; }

        .surah-grid {
            display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
            gap:8px; max-height:340px; overflow-y:auto;
            padding:10px; border:1px solid rgba(212,175,55,.25); border-radius:12px;
        }
        .surah-grid::-webkit-scrollbar { width:6px; }
        .surah-grid::-webkit-scrollbar-track { background:transparent; }
        .surah-grid::-webkit-scrollbar-thumb { background:var(--gold); border-radius:3px; }

        .surah-btn {
            background:var(--gold-dim); border:1px solid rgba(212,175,55,.3);
            color:var(--gold-glow); padding:8px 6px; border-radius:8px;
            cursor:pointer; font-size:.82rem; text-align:center;
            transition:all .2s; display:flex; flex-direction:column; align-items:center; gap:3px;
        }
        .surah-btn:hover, .surah-btn.active {
            background:var(--gold); color:var(--primary-blue); border-color:var(--gold);
        }
        .surah-btn .s-num { font-size:.7rem; opacity:.7; }
        .surah-btn .s-name { font-weight:bold; font-size:.9rem; }

        .now-playing {
            background:rgba(10,25,47,.6); border:2px solid var(--gold);
            border-radius:14px; padding:18px; text-align:center;
        }
        .now-playing .np-label { color:var(--gold-glow); font-size:.85rem; margin-bottom:6px; }
        .now-playing .np-name { color:var(--gold); font-size:1.4rem; font-weight:bold; margin-bottom:12px; }
        #main-audio { width:100%; border-radius:8px; }
        .loading-txt { color:var(--gold-glow); font-size:.9rem; margin-top:8px; min-height:20px; }

        /* ====== المصحف - تصميم جديد واضح ====== */
        #mushaf-viewer {
            display:flex;
            flex-direction:column;
            gap:14px;
        }

        /* شريط الأدوات العلوي */
        .mushaf-toolbar {
            display:flex;
            align-items:center;
            justify-content:space-between;
            flex-wrap:wrap;
            gap:10px;
            background:rgba(10,25,47,.7);
            border:2px solid rgba(212,175,55,.4);
            border-radius:14px;
            padding:12px 16px;
        }

        .toolbar-group {
            display:flex;
            align-items:center;
            gap:8px;
            flex-wrap:wrap;
        }

        .toolbar-label {
            color:var(--gold-glow);
            font-size:.85rem;
            white-space:nowrap;
        }

        /* أزرار التحكم الرئيسية */
        .nav-btn {
            background:var(--gold);
            border:none;
            color:var(--primary-blue);
            padding:10px 22px;
            border-radius:10px;
            cursor:pointer;
            font-size:1.1rem;
            font-weight:bold;
            transition:all .2s;
            display:flex;
            align-items:center;
            gap:6px;
            white-space:nowrap;
        }
        .nav-btn:hover:not(:disabled) {
            background:#f0c84a;
            transform:translateY(-2px);
            box-shadow:0 4px 12px rgba(212,175,55,.5);
        }
        .nav-btn:disabled { opacity:.3; cursor:not-allowed; transform:none; }

        /* عداد الصفحة */
        .page-counter {
            background:rgba(212,175,55,.15);
            border:2px solid var(--gold);
            border-radius:10px;
            padding:8px 16px;
            color:var(--gold);
            font-size:1.1rem;
            font-weight:bold;
            text-align:center;
            min-width:130px;
        }

        /* حقل إدخال رقم الصفحة */
        .page-input {
            background:rgba(10,25,47,.9);
            border:2px solid var(--gold);
            color:var(--text);
            padding:9px 10px;
            border-radius:10px;
            width:75px;
            text-align:center;
            font-size:1.1rem;
            font-weight:bold;
        }
        .page-input:focus { outline:none; box-shadow:0 0 0 3px rgba(212,175,55,.3); }

        /* منتقي السورة */
        .surah-jump-select {
            background:rgba(10,25,47,.9);
            border:2px solid var(--gold);
            color:var(--text);
            padding:9px 12px;
            border-radius:10px;
            font-size:1rem;
            cursor:pointer;
            direction:rtl;
            min-width:180px;
        }
        .surah-jump-select option { background:#172a45; }

        .go-btn {
            background:var(--gold);
            border:none;
            color:var(--primary-blue);
            padding:9px 18px;
            border-radius:10px;
            cursor:pointer;
            font-weight:bold;
            font-size:.95rem;
            transition:all .2s;
        }
        .go-btn:hover { background:#f0c84a; }

        /* أزرار الزوم */
        .zoom-controls {
            display:flex;
            align-items:center;
            gap:6px;
        }
        .zoom-btn {
            background:rgba(212,175,55,.2);
            border:2px solid var(--gold);
            color:var(--gold);
            width:38px;
            height:38px;
            border-radius:8px;
            cursor:pointer;
            font-size:1.3rem;
            font-weight:bold;
            display:flex;
            align-items:center;
            justify-content:center;
            transition:all .2s;
            line-height:1;
        }
        .zoom-btn:hover { background:var(--gold); color:var(--primary-blue); }

        .zoom-level {
            color:var(--gold-glow);
            font-size:.85rem;
            min-width:40px;
            text-align:center;
        }

        /* حاوية صورة المصحف */
        .mushaf-img-container {
            position:relative;
            background:#1a1a2e;
            border:3px solid rgba(212,175,55,.5);
            border-radius:16px;
            overflow:hidden;
            min-height:500px;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .mushaf-scroll-area {
            width:100%;
            overflow:auto;
            display:flex;
            align-items:flex-start;
            justify-content:center;
            padding:10px;
            min-height:500px;
            /* سكرولبار جميل */
        }
        .mushaf-scroll-area::-webkit-scrollbar { width:8px; height:8px; }
        .mushaf-scroll-area::-webkit-scrollbar-track { background:rgba(0,0,0,.3); border-radius:4px; }
        .mushaf-scroll-area::-webkit-scrollbar-thumb { background:var(--gold); border-radius:4px; }

        #mushaf-img {
            display:block;
            max-width:100%;
            border-radius:8px;
            transition:transform .3s ease;
            transform-origin:top center;
            cursor:zoom-in;
            box-shadow:0 4px 30px rgba(0,0,0,.5);
        }

        .mushaf-loading-overlay {
            position:absolute;
            inset:0;
            background:rgba(10,25,47,.9);
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            gap:16px;
            border-radius:13px;
            z-index:5;
        }
        .mushaf-loading-overlay.hidden { display:none; }

        .loading-spinner {
            width:50px;
            height:50px;
            border:4px solid rgba(212,175,55,.2);
            border-top:4px solid var(--gold);
            border-radius:50%;
            animation:spin .8s linear infinite;
        }
        @keyframes spin { to { transform:rotate(360deg); } }

        .loading-text-main {
            color:var(--gold);
            font-size:1.1rem;
        }

        /* شريط التنقل السريع أسفل المصحف */
        .mushaf-quick-nav {
            display:flex;
            align-items:center;
            justify-content:center;
            gap:12px;
            background:rgba(10,25,47,.7);
            border:2px solid rgba(212,175,55,.3);
            border-radius:12px;
            padding:12px;
        }

        .quick-nav-info {
            color:var(--gold-glow);
            font-size:.9rem;
            text-align:center;
        }
        .quick-nav-info strong { color:var(--gold); font-size:1.1rem; }

        /* السبحة */
        .subha-wrap { text-align:center; }
        .subha-circle {
            width:160px; height:160px; border-radius:50%;
            border:4px solid var(--gold); background:none;
            color:var(--gold); font-size:2.8rem; font-weight:bold;
            cursor:pointer; margin:20px auto; display:block;
            box-shadow:0 0 20px rgba(212,175,55,.2);
            transition:all .15s;
        }
        .subha-circle:active { transform:scale(.94); background:rgba(212,175,55,.1); }
        .subha-label { color:var(--gold-glow); font-size:1.1rem; margin-bottom:5px; }
        .subha-reset {
            background:var(--gold); border:none; color:var(--primary-blue);
            padding:10px 22px; border-radius:8px; cursor:pointer; font-weight:bold; font-size:1rem;
            margin-top:10px;
        }

        .dead-img {
            width:150px; height:150px; border-radius:15px;
            border:3px solid var(--gold); object-fit:cover;
            box-shadow:0 0 18px var(--gold); margin-bottom:15px;
        }
        .dua-main {
            font-size:1.5rem; font-weight:bold; color:#fff;
            background:rgba(212,175,55,.18); padding:15px; border-radius:10px;
            border-right:5px solid var(--gold); margin-bottom:22px;
        }

        @keyframes fadeIn { from{opacity:0} to{opacity:1} }

        @media(max-width:600px) {
            .site-title { font-size:1.5rem; }
            .grid { grid-template-columns:repeat(2,1fr); gap:12px; }
            .modal-box { padding:15px 10px; }
            .modal-box.mushaf-modal { padding:12px 8px; }
            .surah-grid { grid-template-columns:repeat(auto-fill,minmax(100px,1fr)); }
            .mushaf-toolbar { flex-direction:column; align-items:stretch; }
            .toolbar-group { justify-content:center; }
            .nav-btn { padding:10px 16px; font-size:1rem; }
            .surah-jump-select { min-width:140px; }
        }
    </style>
</head>

async function fetchMp3QuranReciters() {
    if (_mp3quranCache) return _mp3quranCache;
    const res = await fetch('https://www.mp3quran.net/api/v3/reciters?language=ar');
    if (!res.ok) throw new Error('mp3quran fetch failed');
    const data = await res.json();
    _mp3quranCache = data.reciters || [];
    return _mp3quranCache;
}

async function resolveReciterServer(reciterCfg) {
    const list = await fetchMp3QuranReciters();
    const target = normalizeAr(reciterCfg.nameMatch);
    const match = list.find(r => normalizeAr(r.name).includes(target));
    if (!match || !match.moshaf || !match.moshaf.length) return null;
    let moshaf = match.moshaf[0];
    if (reciterCfg.moshafMatch) {
        const targetMoshaf = normalizeAr(reciterCfg.moshafMatch);
        const found = match.moshaf.find(m => normalizeAr(m.name || '').includes(targetMoshaf));
        if (found) moshaf = found;
    }
    return moshaf.server;
}

/* القرآن */
async function playSurah(num) {
    currentSurah = num;
    const name = SURAHS[num-1][1];
    document.getElementById('np-name').textContent = 'سورة ' + name;
    document.getElementById('q-loading').textContent = 'جاري التحميل...';
    document.querySelectorAll('.surah-btn').forEach(b => b.classList.remove('active'));
    const active = document.getElementById('sb-'+num);
    if(active){ active.classList.add('active'); active.scrollIntoView({block:'nearest',behavior:'smooth'}); }
    const audio = document.getElementById('main-audio');
    const reciterCfg = RECITERS.find(r => r.id === currentReciter) || RECITERS[0];
    let server;
    try { server = await resolveReciterServer(reciterCfg); } catch (e) {
        document.getElementById('q-loading').textContent = '⚠️ تعذّر الاتصال بخادم الصوت'; return;
    }
    if (!server) { document.getElementById('q-loading').textContent = '⚠️ هذا الشيخ غير متاح حالياً'; return; }
    const surahPadded = String(num).padStart(3, '0');
    audio.src = server + surahPadded + '.mp3';
    audio.load();
    audio.oncanplay = () => { document.getElementById('q-loading').textContent = ''; };
    audio.onerror  = () => { document.getElementById('q-loading').textContent = '⚠️ تعذّر تحميل هذه السورة'; };
    audio.onended  = () => { if(currentSurah < 114) playSurah(currentSurah+1); };
    audio.play().catch(()=>{ document.getElementById('q-loading').textContent = 'اضغط زر التشغيل لبدء الاستماع'; });
}

function changeReciter(val) {
    currentReciter = val;
    if(currentSurah) playSurah(currentSurah);
}

/* ====== المصحف ====== */
function setZoom(val) {
    mushafZoom = Math.min(200, Math.max(60, val));
    const img = document.getElementById('mushaf-img');
    const lvl = document.getElementById('zoom-level');
    if(img) img.style.transform = `scale(${mushafZoom/100})`;
    if(lvl) lvl.textContent = mushafZoom + '%';
}

function zoomIn()  { setZoom(mushafZoom + 20); }
function zoomOut() { setZoom(mushafZoom - 20); }
function zoomReset(){ setZoom(100); }

function loadMushafPage(p) {
    if(p<1) p=1; if(p>604) p=604;
    mushafPage = p;
    // تحديث الحقول
    const inp = document.getElementById('page-input');
    const disp = document.getElementById('page-counter');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const bottomInfo = document.getElementById('bottom-page-info');
    if(inp)  inp.value = p;
    if(disp) disp.textContent = 'صفحة ' + p + ' / 604';
    if(prevBtn) prevBtn.disabled = p <= 1;
    if(nextBtn) nextBtn.disabled = p >= 604;
    if(bottomInfo) bottomInfo.innerHTML = `الصفحة <strong>${p}</strong> من <strong>604</strong>`;

    const img = document.getElementById('mushaf-img');
    const overlay = document.getElementById('mushaf-overlay');
    if(img) img.style.display = 'none';
    if(overlay) overlay.classList.remove('hidden');

    const sources = [
        `https://cdn.jsdelivr.net/gh/GovarJabbar/Quran-PNG@master/${String(p).padStart(3,'0')}.png`,
        `https://raw.githubusercontent.com/GovarJabbar/Quran-PNG/master/${String(p).padStart(3,'0')}.png`,
        `https://quran.ksu.edu.sa/ayat/_img/pages/hafs/p${String(p).padStart(3,'0')}.png`
    ];
    let srcIdx = 0;

    function tryNext() {
        if(srcIdx >= sources.length) {
            if(overlay) overlay.querySelector('.loading-text-main').textContent = '⚠️ تعذّر تحميل الصفحة، تحقق من الإنترنت';
            return;
        }
        const tmp = new Image();
        tmp.src = sources[srcIdx];
        tmp.onload = () => {
            if(img) {
                img.src = tmp.src;
                img.style.display = 'block';
                img.style.transform = `scale(${mushafZoom/100})`;
            }
            if(overlay) overlay.classList.add('hidden');
        };
        tmp.onerror = () => { srcIdx++; tryNext(); };
    }
    tryNext();
}

function jumpToSurah(surahNum) {
    if(!surahNum) return;
    loadMushafPage(SURAH_PAGES[parseInt(surahNum)-1]);
}

function closeModal() {
    const audio = document.getElementById('main-audio');
    if(audio) { audio.pause(); audio.src = ''; }
    document.getElementById('mainModal').classList.remove('active');
    document.getElementById('modalBox').classList.remove('mushaf-modal');
    document.body.style.overflow = '';
}

document.getElementById('mainModal').addEventListener('click', function(e) {
    if(e.target === this) closeModal();
});
document.addEventListener('keydown', function(e) {
    if(e.key === 'Escape') closeModal();
    // اختصارات لوحة المفاتيح للمصحف
    if(document.getElementById('mainModal').classList.contains('active')) {
        if(e.key === 'ArrowRight') loadMushafPage(mushafPage - 1);
        if(e.key === 'ArrowLeft')  loadMushafPage(mushafPage + 1);
        if(e.key === '+') zoomIn();
        if(e.key === '-') zoomOut();
    }
});

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#0a192f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="صدقة زياد">
    <meta name="description" content="صدقة جارية على روح زياد خالد - القرآن والأحاديث والأدعية">
    
    <link rel="manifest" href="data:application/json,{
        'name':'صدقة جارية - زياد خالد',
        'short_name':'صدقة زياد',
        'start_url':'./',
        'display':'standalone',
        'theme_color':'#0a192f',
        'background_color':'#0a192f',
        'orientation':'portrait'
    }">
    
    <title>صدقة جارية على روح زياد خالد 🕌</title>
    
    <style>
        :root {
            --primary-blue: #0a192f;
            --light-blue: #172a45;
            --darker-blue: #0d1b2a;
            --gold: #d4af37;
            --gold-glow: #f3e5ab;
            --gold-dim: rgba(212,175,55,0.15);
            --text: #ffffff;
            --text-light: #e8f0f9;
            --accent: #25D366;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'Segoe UI', 'Arial', 'Droid Arabic Kufi', sans-serif;
            background: linear-gradient(135deg, #0d1b2a 0%, #172a45 50%, #0a192f 100%);
            color: var(--text);
            min-height: 100vh;
            font-size: 16px;
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        /* ===== نجوم متحركة ===== */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: fall linear infinite;
            box-shadow: 0 0 6px rgba(255, 255, 255, 0.8);
        }

        @keyframes fall {
            0% { 
                transform: translateY(-20px) translateX(0); 
                opacity: 0; 
            }
            10% { 
                opacity: 1; 
            }
            90% { 
                opacity: 1; 
            }
            100% { 
                transform: translateY(100vh) translateX(50px); 
                opacity: 0; 
            }
        }

        /* ===== الحاوية الرئيسية ===== */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 15px;
            position: relative;
            z-index: 1;
            text-align: center;
        }

        /* ===== الهيدر ===== */
        .main-header {
            margin-bottom: 50px;
            animation: fadeInDown 1s ease;
            padding: 20px;
            background: rgba(10, 25, 47, 0.5);
            border-radius: 20px;
            border: 2px solid rgba(212, 175, 55, 0.3);
            backdrop-filter: blur(10px);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .basmala {
            font-size: 1.8rem;
            color: var(--gold-glow);
            margin-bottom: 15px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            letter-spacing: 2px;
            font-weight: 600;
        }

        .site-title {
            font-size: 2.8rem;
            color: var(--gold);
            text-shadow: 0 4px 20px rgba(212, 175, 55, 0.5);
            font-weight: 800;
            margin-bottom: 10px;
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                text-shadow: 0 4px 20px rgba(212, 175, 55, 0.5);
            }
            50% {
                text-shadow: 0 4px 40px rgba(212, 175, 55, 0.8);
            }
        }

        .site-subtitle {
            font-size: 1.2rem;
            color: var(--text-light);
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .site-description {
            font-size: 0.95rem;
            color: var(--gold-glow);
            opacity: 0.9;
        }

        /* ===== شبكة البطاقات ===== */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px;
            margin-top: 50px;
        }

        .card {
            background: linear-gradient(135deg, rgba(23, 42, 69, 0.8), rgba(13, 27, 42, 0.8));
            border: 3px solid var(--gold);
            border-radius: 20px;
            padding: 25px 15px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 30%, rgba(212, 175, 55, 0.2), transparent);
            pointer-events: none;
        }

        .card:hover {
            transform: translateY(-15px) scale(1.05);
            background: linear-gradient(135deg, var(--gold), #e5c158);
            box-shadow: 0 15px 50px var(--gold);
            border-color: #fff;
        }

        .card:hover h3 {
            color: var(--primary-blue);
        }

        .card:hover .ico {
            transform: scale(1.3) rotate(15deg);
        }

        .card .ico {
            font-size: 3.5rem;
            display: block;
            margin-bottom: 15px;
            transition: transform 0.4s ease;
        }

        .card h3 {
            font-size: 1.15rem;
            color: var(--gold);
            transition: color 0.4s ease;
            font-weight: 700;
        }

        /* ===== المودال ===== */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(10, 25, 47, 0.98);
            z-index: 100;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            overflow-y: auto;
            overflow-x: hidden;
            animation: slideUp 0.4s ease;
            -webkit-overflow-scrolling: touch;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal.active {
            display: flex;
        }

        .modal-box {
            background: linear-gradient(135deg, rgba(23, 42, 69, 0.95), rgba(13, 27, 42, 0.95));
            border: 4px solid var(--gold);
            border-radius: 25px;
            width: 100%;
            max-width: 950px;
            padding: 40px 30px;
            position: relative;
            box-shadow: 0 0 60px rgba(212, 175, 55, 0.4);
            margin: auto;
            backdrop-filter: blur(10px);
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 2.5rem;
            color: var(--gold);
            background: none;
            border: none;
            cursor: pointer;
            line-height: 1;
            transition: all 0.3s ease;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .close-btn:hover {
            color: #fff;
            background: rgba(212, 175, 55, 0.2);
            transform: scale(1.2) rotate(90deg);
        }

        .modal-title {
            color: var(--gold);
            font-size: 2.2rem;
            margin-bottom: 30px;
            border-bottom: 4px solid var(--gold);
            padding-bottom: 15px;
            font-weight: 800;
            text-shadow: 0 2px 10px rgba(212, 175, 55, 0.4);
        }

        /* ===== كروت البيانات ===== */
        .dcard {
            background: rgba(255, 255, 255, 0.06);
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 15px;
            border-right: 5px solid var(--gold);
            text-align: right;
            border-left: none;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        .dcard:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(-5px);
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.2);
        }

        .dcard h3 {
            color: var(--gold);
            margin-bottom: 12px;
            font-size: 1.15rem;
            font-weight: 700;
        }

        .dcard p {
            font-size: 1.05rem;
            color: var(--text-light);
            line-height: 2;
        }

        .dcard strong {
            color: var(--gold-glow);
            font-weight: 600;
        }

        .dcard em {
            color: var(--gold);
            font-style: normal;
            font-size: 0.95rem;
            display: block;
            margin-top: 8px;
        }

        /* ===== آيات ===== */
        .aya-card {
            background: rgba(255, 255, 255, 0.06);
            padding: 22px;
            margin-bottom: 20px;
            border-radius: 15px;
            border-right: 5px solid var(--gold);
            text-align: right;
            border-left: none;
            backdrop-filter: blur(5px);
        }

        .aya-text {
            font-size: 1.2rem;
            color: var(--gold-glow);
            line-height: 2.4;
            margin-bottom: 12px;
            font-weight: 500;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
        }

        .aya-source {
            color: var(--gold);
            font-size: 0.95rem;
            font-style: italic;
            font-weight: 600;
        }

        /* ===== الأذكار والسبحة ===== */
        .subha-wrap {
            text-align: center;
            padding: 30px;
        }

        .subha-label {
            color: var(--gold-glow);
            font-size: 1.3rem;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .subha-circle {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), var(--gold-glow));
            border: 6px solid var(--gold);
            color: var(--primary-blue);
            font-size: 5rem;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 15px 40px var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }

        .subha-circle:hover {
            transform: scale(1.12) rotate(-5deg);
            box-shadow: 0 20px 60px var(--gold);
        }

        .subha-circle:active {
            transform: scale(0.95);
        }

        .subha-reset {
            background: rgba(212, 175, 55, 0.2);
            border: 3px solid var(--gold);
            color: var(--gold);
            padding: 14px 35px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.05rem;
            margin-top: 30px;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .subha-reset:hover {
            background: var(--gold);
            color: var(--primary-blue);
            transform: translateY(-3px);
        }

        /* ===== الدعاء ===== */
        .dua-main {
            font-size: 1.6rem;
            color: var(--gold);
            font-weight: 800;
            margin: 30px 0;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            line-height: 2;
            letter-spacing: 1px;
        }

        /* ===== تواصل ===== */
        .dev-wrap {
            margin-top: 50px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .dev-btn {
            background: linear-gradient(135deg, rgba(23, 42, 69, 0.8), rgba(13, 27, 42, 0.8));
            border: 2px solid var(--gold);
            border-radius: 12px;
            padding: 15px 30px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            color: var(--gold);
            font-size: 1rem;
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 700;
        }

        .dev-btn:hover {
            background: rgba(37, 211, 102, 0.2);
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.2);
        }

        /* ===== استجابة متقدمة ===== */
        @media (max-width: 768px) {
            .site-title {
                font-size: 2rem;
            }
            .basmala {
                font-size: 1.4rem;
            }
            .modal-title {
                font-size: 1.6rem;
            }
            .grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
                margin-top: 30px;
            }
            .card {
                min-height: 160px;
                padding: 18px 12px;
            }
            .card .ico {
                font-size: 2.8rem;
            }
            .card h3 {
                font-size: 0.95rem;
            }
            .modal-box {
                padding: 30px 20px;
            }
        }

        @media (max-width: 480px) {
            body {
                font-size: 14px;
            }
            .container {
                padding: 20px 12px;
            }
            .main-header {
                margin-bottom: 30px;
                padding: 15px;
            }
            .site-title {
                font-size: 1.6rem;
            }
            .basmala {
                font-size: 1.1rem;
            }
            .grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .card {
                min-height: 140px;
            }
            .modal-box {
                padding: 20px 15px;
                border-radius: 15px;
            }
            .modal-title {
                font-size: 1.3rem;
                margin-bottom: 20px;
            }
            .dcard,
            .aya-card {
                padding: 15px;
            }
            .aya-text {
                font-size: 1rem;
                line-height: 2;
            }
            .subha-circle {
                width: 180px;
                height: 180px;
                font-size: 4rem;
            }
        }

        /* ===== الإشعارات ===== */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: var(--gold);
            color: var(--primary-blue);
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4);
            z-index: 1000;
            animation: slideInUp 0.4s ease;
            font-weight: 700;
        }

        @keyframes slideInUp {
            from {
                transform: translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* ===== تحميل ===== */
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(212, 175, 55, 0.3);
            border-radius: 50%;
            border-top-color: var(--gold);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ===== اختيار النص ===== */
        ::selection {
            background: var(--gold);
            color: var(--primary-blue);
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(212, 175, 55, 0.1);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--gold-glow);
        }
    </style>
</head>
<body>
    <!-- النجوم المتحركة -->
    <div class="stars" id="stars-container"></div>

    <!-- المحتوى الرئيسي -->
    <div class="container">
        <!-- الرأس -->
        <div class="main-header">
            <div class="basmala">✨ بسم الله الرحمن الرحيم ✨</div>
            <h1 class="site-title">🕌 صدقة جارية</h1>
            <div class="site-subtitle">على روح زياد خالد رحمه الله</div>
            <div class="site-description">كل قراءة وتسبيح ودعاء = صدقة جارية له</div>
        </div>

        <!-- الأقسام -->
        <div class="grid">
            <div class="card" onclick="openModal('quran')">
                <span class="ico">📖</span>
                <h3>القرآن الكريم</h3>
            </div>
            <div class="card" onclick="openModal('quran-ayat')">
                <span class="ico">✨</span>
                <h3>آيات مختارة</h3>
            </div>
            <div class="card" onclick="openModal('hadith')">
                <span class="ico">📚</span>
                <h3>أحاديث شريفة</h3>
            </div>
            <div class="card" onclick="openModal('azkar')">
                <span class="ico">☀️</span>
                <h3>الأذكار اليومية</h3>
            </div>
            <div class="card" onclick="openModal('dua')">
                <span class="ico">🤲</span>
                <h3>أدعية للمتوفي</h3>
            </div>
            <div class="card" onclick="openModal('subha')">
                <span class="ico">📿</span>
                <h3>السبحة الإلكترونية</h3>
            </div>
            <div class="card" onclick="openModal('reciter')">
                <span class="ico">🎤</span>
                <h3>استماع قرآن</h3>
            </div>
            <div class="card" onclick="openModal('mushaf')">
                <span class="ico">📕</span>
                <h3>المصحف الكامل</h3>
            </div>
        </div>

        <!-- التواصل -->
        <div class="dev-wrap">
            <a href="https://wa.me/201012345678?text=%F0%9F%95%8C%20السلام%20عليكم%20-%20تطبيق%20الصدقة%20الجارية" 
               class="dev-btn" target="_blank">
                📲 تواصل معنا
            </a>
            <button class="dev-btn" onclick="installApp()">
                📱 ثبّت التطبيق
            </button>
        </div>
    </div>

    <!-- المودال الرئيسي -->
    <div id="mainModal" class="modal">
        <div class="modal-box">
            <button class="close-btn" onclick="closeModal()">✕</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        // ===== متغيرات عامة =====
        let subhaCount = 0;
        let deferredPrompt;
        let mushafPage = 1;

        // ===== إنشاء النجوم =====
        function createStars() {
            const container = document.getElementById('stars-container');
            for(let i = 0; i < 60; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 0.5;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * -10 + 'px';
                star.style.animationDuration = (Math.random() * 4 + 3) + 's';
                star.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(star);
            }
        }
        createStars();

        // ===== Service Worker =====
        if('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:application/javascript,' + encodeURIComponent(`
                const CACHE = 'sadaqah-v1';
                self.addEventListener('install', e => e.waitUntil(caches.open(CACHE).then(c => c.addAll(['/'])).then(() => self.skipWaiting())));
                self.addEventListener('activate', e => e.waitUntil(clients.claim()));
                self.addEventListener('fetch', e => {
                    if(!e.request.url.startsWith('http')) return;
                    e.respondWith(
                        caches.match(e.request).then(r => r || fetch(e.request).then(r => {
                            if(r.status === 200) caches.open(CACHE).then(c => c.put(e.request, r.clone()));
                            return r;
                        }).catch(() => caches.match('/'))
                    );
                });
            `)).catch(() => {});
        }

        // ===== تثبيت التطبيق =====
        window.addEventListener('beforeinstallprompt', e => {
            e.preventDefault();
            deferredPrompt = e;
        });

        function installApp() {
            if(deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(() => {
                    deferredPrompt = null;
                    showToast('✅ تم تثبيت التطبيق بنجاح!');
                });
            } else {
                showToast('📱 التطبيق قد يكون مثبتاً بالفعل');
            }
        }

        // ===== إظهار رسالة =====
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ===== فتح المودال =====
        function openModal(sec) {
            const modal = document.getElementById('mainModal');
            const content = document.getElementById('modal-content');
            let html = '';

            if(sec === 'quran') {
                html = `
                <h2 class="modal-title">📖 سورة الفاتحة - فاتحة الكتاب</h2>
                <div class="aya-card">
                    <div class="aya-text">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
                </div>
                <div class="aya-card">
                    <div class="aya-text">الْحَمْدُ لِلَّهِ رَبِّ الْعَالَمِينَ</div>
                </div>
                <div class="aya-card">
                    <div class="aya-text">الرَّحْمَٰنِ الرَّحِيمِ</div>
                </div>
                <div class="aya-card">
                    <div class="aya-text">مَالِكِ يَوْمِ الدِّينِ</div>
                </div>
                <div class="aya-card">
                    <div class="aya-text">إِيَّاكَ نَعْبُدُ وَإِيَّاكَ نَسْتَعِينُ</div>
                </div>
                <div class="aya-card">
                    <div class="aya-text">اهْدِنَا الصِّرَاطَ الْمُسْتَقِيمَ</div>
                </div>
                <div class="aya-card">
                    <div class="aya-text">صِرَاطَ الَّذِينَ أَنْعَمْتَ عَلَيْهِمْ غَيْرِ الْمَغْضُوبِ عَلَيْهِمْ وَلَا الضَّالِّينَ</div>
                    <div class="aya-source">سورة الفاتحة</div>

            document.body.style.overflow = '';
        }

        // إغلاق عند الضغط خارج البوكس
        document.getElementById('mainModal').addEventListener('click', function(e) {
            if(e.target === this) closeModal();
        });

        // إغلاق بضغط Escape
        document.addEventListener('keydown', function(e) {
            if(e.key === 'Escape') closeModal();
        });

        // ===== السبحة =====
        function clickSubha() {
            subhaCount++;
            document.getElementById('subhaNum').textContent = subhaCount;
            // مؤثر صوتي افتراضي
            if(subhaCount % 10 === 0) {
                showToast(`🎉 ${subhaCount} تسبيحة`);
            }
        }

        function resetSubha() {
            subhaCount = 0;
            document.getElementById('subhaNum').textContent = '0';
            showToast('✅ تم إعادة تعيين العداد');
        }

        // ===== المصحف =====
        function loadMushafPage(page) {
            page = parseInt(page);
            if(page < 1 || page > 604) {
                showToast('❌ رقم الصفحة يجب أن يكون بين 1 و 604');
                return;
            }

            mushafPage = page;
            const img = document.getElementById('mushaf-img');
            const loading = document.getElementById('mushaf-loading');
            const input = document.getElementById('page-input');

            loading.style.display = 'block';
            img.style.display = 'none';

            // محاولة تحميل الصورة من عدة مصادر
            img.src = `https://quran.com/api/v1/mushaf/pages/1/${page}.png`;

            img.onload = () => {
                loading.style.display = 'none';
                img.style.display = 'block';
            };

            img.onerror = () => {
                loading.innerHTML = '❌ لم يتمكن من تحميل الصفحة<br><small>تأكد من اتصالك بالإنترنت</small>';
            };

            input.value = page;
        }

        function nextPage() {
            loadMushafPage(mushafPage + 1);
        }

        function prevPage() {
            loadMushafPage(mushafPage - 1);
        }

        function playRecitation(reciter) {
            if(!reciter) {
                showToast('اختر قارئاً أولاً');
                return;
            }
            showToast(`🎵 جاري تشغيل تلاوة ${reciter}`);
        }

        // ===== Service Worker للوضع الأوفلاين =====
        if('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:application/javascript,' + encodeURIComponent(
                `const CACHE='sadaqah-v1';
                self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(['/'])).then(()=>self.skipWaiting())));
                self.addEventListener('activate',e=>e.waitUntil(clients.claim()));
                self.addEventListener('fetch',e=>{
                    if(!e.request.url.startsWith('http'))return;
                    e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(r=>{
                        if(r.status===200)caches.open(CACHE).then(c=>c.put(e.request,r.clone()));
                        return r;
                    }).catch(()=>caches.match('/')))
                });`
            )).catch(()=>{});
        }

        // تشغيل التطبيق
        showToast('🕌 أهلاً وسهلاً - صدقة جارية على روح زياد خالد');
    </script>
</body>
</html>

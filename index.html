<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صدقة جارية على روح زياد خالد</title>
    <style>
        :root {
            --primary-blue: #0a192f;
            --light-blue: #172a45;
            --gold: #d4af37;
            --gold-glow: #f3e5ab;
            --gold-dim: rgba(212,175,55,0.15);
            --text: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, var(--light-blue) 0%, var(--primary-blue) 100%);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== نجوم ===== */
        .stars { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
        .star { position:absolute; background:white; border-radius:50%; animation:fall linear infinite; }
        @keyframes fall {
            0%   { transform:translateY(-20px); opacity:0; }
            10%  { opacity:1; }
            90%  { opacity:1; }
            100% { transform:translateY(100vh) translateX(30px); opacity:0; }
        }

        /* ===== الحاوية ===== */
        .container { max-width:1100px; margin:0 auto; padding:25px 20px; position:relative; z-index:1; text-align:center; }

        /* ===== الهيدر ===== */
        .main-header { margin-bottom:40px; animation:fadeIn 1.5s ease; }
        .profile-img {
            width:180px; height:180px; border-radius:50%;
            border:4px solid var(--gold); box-shadow:0 0 30px var(--gold);
            object-fit:cover; margin-bottom:18px; transition:transform .3s;
        }
        .profile-img:hover { transform:scale(1.05); }
        .basmala { font-size:1.4rem; color:var(--gold-glow); margin-bottom:8px; }
        .site-title { font-size:2rem; color:var(--gold); text-shadow:0 2px 12px rgba(212,175,55,.5); }

        /* ===== شبكة البطاقات ===== */
        .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:20px; margin-top:30px; }
        .card {
            background:rgba(23,42,69,.85); border:2px solid var(--gold);
            border-radius:15px; padding:22px 12px; cursor:pointer;
            transition:all .3s; box-shadow:0 4px 14px rgba(0,0,0,.3);
        }
        .card:hover { transform:translateY(-8px); background:var(--gold); box-shadow:0 10px 25px var(--gold); }
        .card:hover h3 { color:var(--primary-blue); }
        .card .ico { font-size:2.8rem; display:block; margin-bottom:12px; }
        .card h3 { font-size:1.05rem; color:var(--gold); transition:color .3s; }

        /* ===== تواصل مع المطور ===== */
        .dev-wrap { margin-top:30px; display:flex; justify-content:center; }
        .dev-btn {
            background:rgba(23,42,69,.6); border:1px solid rgba(212,175,55,.4);
            border-radius:12px; padding:11px 24px; cursor:pointer;
            display:inline-flex; align-items:center; gap:10px;
            color:rgba(212,175,55,.7); font-size:.9rem; text-decoration:none;
            transition:all .3s;
        }
        .dev-btn:hover { background:rgba(37,211,102,.15); border-color:#25D366; color:#25D366; transform:translateY(-3px); }

        /* ===== المودال ===== */
        .modal {
            display:none; position:fixed; inset:0;
            background:rgba(10,25,47,.97); z-index:100;
            justify-content:center; align-items:flex-start;
            padding:20px; overflow-y:auto;
            animation:fadeIn .3s ease;
        }
        .modal.active { display:flex; }
        .modal-box {
            background:var(--light-blue); border:3px solid var(--gold);
            border-radius:20px; width:100%; max-width:860px;
            padding:30px 25px; position:relative;
            box-shadow:0 0 40px rgba(212,175,55,.25);
            margin:auto;
        }
        .close-btn {
            position:absolute; top:14px; right:18px; font-size:2rem;
            color:var(--gold); background:none; border:none; cursor:pointer; line-height:1;
        }
        .close-btn:hover { color:#fff; }
        .modal-title {
            color:var(--gold); font-size:1.7rem; margin-bottom:22px;
            border-bottom:2px solid var(--gold); padding-bottom:10px;
        }

        /* ===== كروت البيانات ===== */
        .dcard {
            background:rgba(255,255,255,.05); padding:15px;
            margin-bottom:14px; border-radius:10px; border-left:3px solid var(--gold);
            text-align:right; line-height:1.9;
        }
        .dcard h3 { color:var(--gold); margin-bottom:8px; }

        /* ===== مشغل القرآن ===== */
        #quran-player { display:flex; flex-direction:column; gap:18px; }

        .reciter-select-wrap { display:flex; flex-direction:column; gap:8px; text-align:right; }
        .reciter-select-wrap label { color:var(--gold-glow); font-size:.95rem; }
        select.q-select {
            background:rgba(10,25,47,.8); border:2px solid var(--gold);
            color:var(--text); padding:10px 14px; border-radius:10px;
            font-size:1rem; width:100%; cursor:pointer; direction:rtl;
        }
        select.q-select:focus { outline:none; box-shadow:0 0 0 2px rgba(212,175,55,.4); }
        select.q-select option { background:#172a45; }

        .surah-grid {
            display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
            gap:8px; max-height:340px; overflow-y:auto;
            padding:10px; border:1px solid rgba(212,175,55,.25); border-radius:12px;
        }
        .surah-grid::-webkit-scrollbar { width:6px; }
        .surah-grid::-webkit-scrollbar-track { background:transparent; }
        .surah-grid::-webkit-scrollbar-thumb { background:var(--gold); border-radius:3px; }

        .surah-btn {
            background:var(--gold-dim); border:1px solid rgba(212,175,55,.3);
            color:var(--gold-glow); padding:8px 6px; border-radius:8px;
            cursor:pointer; font-size:.82rem; text-align:center;
            transition:all .2s; display:flex; flex-direction:column; align-items:center; gap:3px;
        }
        .surah-btn:hover, .surah-btn.active {
            background:var(--gold); color:var(--primary-blue); border-color:var(--gold);
        }
        .surah-btn .s-num { font-size:.7rem; opacity:.7; }
        .surah-btn .s-name { font-weight:bold; font-size:.9rem; }

        .now-playing {
            background:rgba(10,25,47,.6); border:2px solid var(--gold);
            border-radius:14px; padding:18px; text-align:center;
        }
        .now-playing .np-label { color:var(--gold-glow); font-size:.85rem; margin-bottom:6px; }
        .now-playing .np-name { color:var(--gold); font-size:1.4rem; font-weight:bold; margin-bottom:12px; }
        #main-audio { width:100%; border-radius:8px; }
        .loading-txt { color:var(--gold-glow); font-size:.9rem; margin-top:8px; min-height:20px; }

        /* ===== المصحف ===== */
        #mushaf-viewer { display:flex; flex-direction:column; gap:14px; }
        .page-controls {
            display:flex; align-items:center; justify-content:center;
            gap:12px; flex-wrap:wrap;
        }
        .page-btn {
            background:var(--gold-dim); border:2px solid var(--gold);
            color:var(--gold); padding:8px 18px; border-radius:8px;
            cursor:pointer; font-size:1rem; transition:all .2s;
        }
        .page-btn:hover:not(:disabled) { background:var(--gold); color:var(--primary-blue); }
        .page-btn:disabled { opacity:.3; cursor:not-allowed; }
        .page-num-display {
            color:var(--gold); font-size:1rem; min-width:100px; text-align:center;
        }
        .page-input {
            background:rgba(10,25,47,.8); border:2px solid var(--gold);
            color:var(--text); padding:8px 10px; border-radius:8px;
            width:70px; text-align:center; font-size:1rem;
        }
        .mushaf-img-wrap {
            display:flex; justify-content:center; align-items:center;
            min-height:300px; background:rgba(0,0,0,.3);
            border-radius:12px; overflow:hidden; border:2px solid rgba(212,175,55,.3);
        }
        #mushaf-img {
            max-width:100%; max-height:70vh; display:block;
            border-radius:10px;
        }
        .mushaf-loading {
            color:var(--gold-glow); font-size:1rem;
            display:none; padding:40px;
        }
        .surah-jump {
            display:flex; gap:8px; align-items:center; flex-wrap:wrap; justify-content:center;
        }
        .surah-jump label { color:var(--gold-glow); font-size:.9rem; }
        #surah-jump-select {
            background:rgba(10,25,47,.8); border:2px solid var(--gold);
            color:var(--text); padding:8px 12px; border-radius:8px;
            font-size:.9rem; cursor:pointer; direction:rtl; flex:1; min-width:160px;
        }
        #surah-jump-select option { background:#172a45; }
        .jump-btn {
            background:var(--gold); border:none; color:var(--primary-blue);
            padding:8px 16px; border-radius:8px; cursor:pointer; font-weight:bold; font-size:.9rem;
        }

        /* ===== السبحة ===== */
        .subha-wrap { text-align:center; }
        .subha-circle {
            width:160px; height:160px; border-radius:50%;
            border:4px solid var(--gold); background:none;
            color:var(--gold); font-size:2.8rem; font-weight:bold;
            cursor:pointer; margin:20px auto; display:block;
            box-shadow:0 0 20px rgba(212,175,55,.2);
            transition:all .15s;
        }
        .subha-circle:active { transform:scale(.94); background:rgba(212,175,55,.1); }
        .subha-label { color:var(--gold-glow); font-size:1.1rem; margin-bottom:5px; }
        .subha-reset {
            background:var(--gold); border:none; color:var(--primary-blue);
            padding:10px 22px; border-radius:8px; cursor:pointer; font-weight:bold; font-size:1rem;
            margin-top:10px;
        }

        /* ===== الدعاء - صورة المتوفي ===== */
        .dead-img {
            width:150px; height:150px; border-radius:15px;
            border:3px solid var(--gold); object-fit:cover;
            box-shadow:0 0 18px var(--gold); margin-bottom:15px;
        }
        .dua-main {
            font-size:1.5rem; font-weight:bold; color:#fff;
            background:rgba(212,175,55,.18); padding:15px; border-radius:10px;
            border-right:5px solid var(--gold); margin-bottom:22px;
        }

        @keyframes fadeIn { from{opacity:0} to{opacity:1} }

        @media(max-width:520px) {
            .site-title { font-size:1.5rem; }
            .grid { grid-template-columns:repeat(2,1fr); gap:12px; }
            .modal-box { padding:20px 14px; }
            .surah-grid { grid-template-columns:repeat(auto-fill,minmax(100px,1fr)); }
        }
    </style>
</head>
<body>

<div class="stars" id="starsEl"></div>

<div class="container">
    <header class="main-header">
        <img src="1000043244.jpg" alt="زياد خالد" class="profile-img" onerror="this.style.display='none'">
        <div class="basmala">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
        <h1 class="site-title">صدقة جارية على روح أخويا زياد خالد</h1>
    </header>

    <main class="grid">
        <div class="card" onclick="openSection('quran')">
            <span class="ico">🎧</span><h3>القرآن الكريم</h3>
        </div>
        <div class="card" onclick="openSection('mushaf')">
            <span class="ico">📖</span><h3>المصحف الإلكتروني</h3>
        </div>
        <div class="card" onclick="openSection('subha')">
            <span class="ico">📿</span><h3>السبحة الإلكترونية</h3>
        </div>
        <div class="card" onclick="openSection('azkar')">
            <span class="ico">☀️</span><h3>الأذكار كاملة</h3>
        </div>
        <div class="card" onclick="openSection('hadith')">
            <span class="ico">📚</span><h3>الأحاديث الدينية</h3>
        </div>
        <div class="card" onclick="openSection('dua')">
            <span class="ico">🤲</span><h3>دعاء للمتوفي</h3>
        </div>
    </main>

    <div class="dev-wrap">
        <a href="https://wa.me/201117632401" target="_blank" rel="noopener" class="dev-btn">
            <span>💬</span><span>تواصل مع المطور</span>
        </a>
    </div>
</div>

<!-- المودال الرئيسي -->
<div class="modal" id="mainModal">
    <div class="modal-box">
        <button class="close-btn" onclick="closeModal()" aria-label="إغلاق">&times;</button>
        <div id="modalContent"></div>
    </div>
</div>

<script>
/* ======= النجوم ======= */
(function(){
    const c = document.getElementById('starsEl');
    for(let i=0;i<45;i++){
        const s = document.createElement('div');
        s.className = 'star';
        const sz = Math.random()*3+1;
        s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}vw;
            animation-duration:${Math.random()*4+2}s;animation-delay:${Math.random()*6}s`;
        c.appendChild(s);
    }
})();

/* ======= بيانات السور ======= */
const SURAHS = [
    [1,"الفاتحة"],[2,"البقرة"],[3,"آل عمران"],[4,"النساء"],[5,"المائدة"],
    [6,"الأنعام"],[7,"الأعراف"],[8,"الأنفال"],[9,"التوبة"],[10,"يونس"],
    [11,"هود"],[12,"يوسف"],[13,"الرعد"],[14,"إبراهيم"],[15,"الحجر"],
    [16,"النحل"],[17,"الإسراء"],[18,"الكهف"],[19,"مريم"],[20,"طه"],
    [21,"الأنبياء"],[22,"الحج"],[23,"المؤمنون"],[24,"النور"],[25,"الفرقان"],
    [26,"الشعراء"],[27,"النمل"],[28,"القصص"],[29,"العنكبوت"],[30,"الروم"],
    [31,"لقمان"],[32,"السجدة"],[33,"الأحزاب"],[34,"سبأ"],[35,"فاطر"],
    [36,"يس"],[37,"الصافات"],[38,"ص"],[39,"الزمر"],[40,"غافر"],
    [41,"فصلت"],[42,"الشورى"],[43,"الزخرف"],[44,"الدخان"],[45,"الجاثية"],
    [46,"الأحقاف"],[47,"محمد"],[48,"الفتح"],[49,"الحجرات"],[50,"ق"],
    [51,"الذاريات"],[52,"الطور"],[53,"النجم"],[54,"القمر"],[55,"الرحمن"],
    [56,"الواقعة"],[57,"الحديد"],[58,"المجادلة"],[59,"الحشر"],[60,"الممتحنة"],
    [61,"الصف"],[62,"الجمعة"],[63,"المنافقون"],[64,"التغابن"],[65,"الطلاق"],
    [66,"التحريم"],[67,"الملك"],[68,"القلم"],[69,"الحاقة"],[70,"المعارج"],
    [71,"نوح"],[72,"الجن"],[73,"المزمل"],[74,"المدثر"],[75,"القيامة"],
    [76,"الإنسان"],[77,"المرسلات"],[78,"النبأ"],[79,"النازعات"],[80,"عبس"],
    [81,"التكوير"],[82,"الانفطار"],[83,"المطففين"],[84,"الانشقاق"],[85,"البروج"],
    [86,"الطارق"],[87,"الأعلى"],[88,"الغاشية"],[89,"الفجر"],[90,"البلد"],
    [91,"الشمس"],[92,"الليل"],[93,"الضحى"],[94,"الشرح"],[95,"التين"],
    [96,"العلق"],[97,"القدر"],[98,"البينة"],[99,"الزلزلة"],[100,"العاديات"],
    [101,"القارعة"],[102,"التكاثر"],[103,"العصر"],[104,"الهمزة"],[105,"الفيل"],
    [106,"قريش"],[107,"الماعون"],[108,"الكوثر"],[109,"الكافرون"],[110,"النصر"],
    [111,"المسد"],[112,"الإخلاص"],[113,"الفلق"],[114,"الناس"]
];

/* الشيوخ مع معرفاتهم في islamic.network */
const RECITERS = [
    {id:"ar.abdulbasitmurattal", name:"عبد الباسط عبد الصمد - مرتل"},
    {id:"ar.abdulsamad",         name:"عبد الباسط عبد الصمد - مجود"},
    {id:"ar.alafasy",            name:"مشاري العفاسي"},
    {id:"ar.mahermuaiqly",       name:"ماهر المعيقلي"},
    {id:"ar.husary",             name:"محمود خليل الحصري"},
    {id:"ar.minshawi",           name:"محمد صديق المنشاوي"},
    {id:"ar.muhammadayyoub",     name:"محمد أيوب"},
    {id:"ar.parhizgar",          name:"عبد الله عمر الفارسي"},
    {id:"ar.shaatree",           name:"أبو بكر الشاطري"},
    {id:"ar.saoodashuraym",      name:"سعود الشريم"},
];

/* صفحات بداية كل سورة في المصحف (604 صفحة) */
const SURAH_PAGES = [
    1,2,50,77,106,128,151,177,187,208,221,235,249,255,262,267,282,293,305,312,
    322,332,342,350,359,367,377,385,396,404,411,415,418,428,434,440,446,453,458,467,
    477,483,489,495,499,503,507,510,513,516,519,521,523,526,528,531,537,542,545,549,
    551,553,554,556,558,560,562,564,566,568,570,572,574,575,577,578,580,582,583,584,
    586,587,587,588,589,590,591,591,592,593,594,595,595,596,596,597,597,598,598,599,
    599,599,600,600,601,601,601,602,602,602,603,603,603,604
];

let currentSurah = 1;
let currentReciter = RECITERS[0].id;
let subhaCount = 0;
let mushafPage = 1;

/* ======= السبحة ======= */
function clickSubha() {
    subhaCount++;
    document.getElementById('subhaNum').textContent = subhaCount;
}
function resetSubha() {
    subhaCount = 0;
    document.getElementById('subhaNum').textContent = 0;
}

/* ======= القرآن: تشغيل سورة ======= */
function playSurah(num) {
    currentSurah = num;
    const name = SURAHS[num-1][1];
    document.getElementById('np-name').textContent = 'سورة ' + name;
    document.getElementById('q-loading').textContent = 'جاري التحميل...';

    // تحديث الزر النشط
    document.querySelectorAll('.surah-btn').forEach(b => b.classList.remove('active'));
    const active = document.getElementById('sb-'+num);
    if(active){ active.classList.add('active'); active.scrollIntoView({block:'nearest',behavior:'smooth'}); }

    const numStr = String(num).padStart(3,'0');
    const audio = document.getElementById('main-audio');
    audio.src = `https://cdn.islamic.network/quran/audio-surah/128/${currentReciter}/${numStr}.mp3`;
    audio.load();
    audio.play().catch(()=>{
        document.getElementById('q-loading').textContent = 'اضغط زر التشغيل أعلاه لبدء الاستماع';
    });
    audio.oncanplay = () => { document.getElementById('q-loading').textContent = ''; };
    audio.onerror  = () => {
        document.getElementById('q-loading').textContent = '⚠️ تعذّر التحميل، جرّب شيخاً آخر';
    };
    audio.onended  = () => { if(currentSurah < 114) playSurah(currentSurah+1); };
}

function changeReciter(val) {
    currentReciter = val;
    if(currentSurah) playSurah(currentSurah);
}

/* ======= المصحف ======= */
function loadMushafPage(p) {
    if(p<1) p=1; if(p>604) p=604;
    mushafPage = p;
    document.getElementById('page-input').value = p;
    document.getElementById('page-display').textContent = 'صفحة ' + p + ' من 604';
    document.getElementById('prev-page').disabled = p<=1;
    document.getElementById('next-page').disabled = p>=604;

    const img = document.getElementById('mushaf-img');
    const loading = document.getElementById('mushaf-loading');
    img.style.display = 'none';
    loading.style.display = 'block';
    loading.textContent = 'جاري تحميل الصفحة...';

    const numStr = String(p).padStart(3,'0');
    const newImg = new Image();
    // المصدر الأول: quran.ksu.edu.sa
    newImg.src = `https://quran.ksu.edu.sa/ayat/_img/pages/hafs/p${numStr}.png`;
    newImg.onload = () => {
        img.src = newImg.src;
        img.style.display = 'block';
        loading.style.display = 'none';
    };
    newImg.onerror = () => {
        // مصدر بديل
        const fallback = new Image();
        fallback.src = `https://cdn.islamic.network/quran/images/page${numStr}_ar.png`;
        fallback.onload = () => {
            img.src = fallback.src;
            img.style.display = 'block';
            loading.style.display = 'none';
        };
        fallback.onerror = () => {
            loading.textContent = '⚠️ تعذّر تحميل الصفحة، تحقق من الاتصال';
        };
    };
}

function jumpToSurah(surahNum) {
    if(!surahNum) return;
    const page = SURAH_PAGES[parseInt(surahNum)-1];
    loadMushafPage(page);
}

/* ======= فتح الأقسام ======= */
function openSection(sec) {
    const modal = document.getElementById('mainModal');
    const content = document.getElementById('modalContent');
    let html = '';

    if(sec === 'quran') {
        const reciterOpts = RECITERS.map(r =>
            `<option value="${r.id}">${r.name}</option>`
        ).join('');

        const surahBtns = SURAHS.map(([n,name]) =>
            `<button class="surah-btn" id="sb-${n}" onclick="playSurah(${n})">
                <span class="s-num">${n}</span>
                <span class="s-name">${name}</span>
            </button>`
        ).join('');

        html = `
        <h2 class="modal-title">🎧 القرآن الكريم كاملاً - 114 سورة</h2>
        <div id="quran-player">
            <div class="reciter-select-wrap">
                <label>اختر الشيخ:</label>
                <select class="q-select" onchange="changeReciter(this.value)">${reciterOpts}</select>
            </div>
            <div class="now-playing">
                <div class="np-label">يتم تشغيل:</div>
                <div class="np-name" id="np-name">اختر سورة</div>
                <audio id="main-audio" controls style="width:100%;border-radius:8px;"></audio>
                <div class="loading-txt" id="q-loading"></div>

    modal.classList.add('active');

    // تحميل أول صفحة المصحف تلقائياً
    if(sec === 'mushaf') {
        setTimeout(() => loadMushafPage(1), 100);
    }
}

function closeModal() {
    // إيقاف الصوت لو شغال
    const audio = document.getElementById('main-audio');
    if(audio) { audio.pause(); audio.src = ''; }
    document.getElementById('mainModal').classList.remove('active');
    document.body.style.overflow = '';
}

// إغلاق بالضغط خارج البوكس
document.getElementById('mainModal').addEventListener('click', function(e) {
    if(e.target === this) closeModal();
});

// إغلاق بـ Escape
document.addEventListener('keydown', function(e) {
    if(e.key === 'Escape') closeModal();
});
</script>

</html>
